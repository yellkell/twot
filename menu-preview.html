<!doctype html>
<!-- Dev bench: renders the lobby panes as flat canvases, no XR needed.
     Served by `npm run dev` at /menu-preview.html — NOT part of the build. -->
<html>
  <head>
    <meta charset="utf-8" />
    <title>TWOT menu bench</title>
    <style>
      body { background: #2b3947; margin: 24px; font: 14px system-ui; color: #cfe3f5; }
      .row { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
      figure { margin: 0; }
      figcaption { margin-bottom: 6px; opacity: 0.7; }
      canvas { max-width: 560px; height: auto; }
    </style>
  </head>
  <body>
    <div class="row" id="bench"></div>
    <script type="module">
      import { Scene } from 'three';
      import { createMenu, createPausePanel } from '/src/menu/menu.ts';

      const bench = document.getElementById('bench');
      const menu = createMenu(new Scene());
      const pause = createPausePanel();
      menu.redrawAll('play'); // centre pane hot so the button glow shows
      pause.redraw(true);

      for (const p of [...menu.panels, pause]) {
        const src = p.mesh.material.map.image;
        const fig = document.createElement('figure');
        const cap = document.createElement('figcaption');
        cap.textContent = p.id;
        fig.appendChild(cap);
        fig.appendChild(src);
        bench.appendChild(fig);
      }
      document.body.dataset.bench = 'ready';
    </script>
  </body>
</html>
